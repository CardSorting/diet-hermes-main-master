name: Diet integrations check

on:
  pull_request:
  push:
    branches: [master, main, sync/**]

jobs:
  broccolidb-joyzoning-overlay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b16344cecbd52dd7e6f2c5d6a0c  # v4.2.2

      - name: Assert integration paths exist
        run: |
          set -euo pipefail
          test -f broccolidb/package.json
          test -d broccolidb/core
          test -f plugins/joyzoning_governance/plugin.yaml
          test -f plugins/joyzoning_governance/__init__.py
          test -f tools/broccolidb_tools/runner.py
          test -f tools/broccolidb.py
          test -f scripts/joy_check.py
          grep -q 'broccolidb_init' toolsets.py
          grep -q 'broccolidb_check_layering' toolsets.py
          grep -q '"/dietcode"' web/src/App.tsx

      - uses: actions/setup-python@0b93645e9fea731c7a2a2aa6c358edd285328f92  # v5.3.0
        with:
          python-version: "3.11"

      - name: BroccoliDB tool registry smoke test
        run: |
          python -c "
          from tools.registry import discover_builtin_tools, registry
          discover_builtin_tools()
          tools = registry.get_tool_names_for_toolset('broccolidb')
          assert len(tools) >= 23, tools
          print('broccolidb tools:', len(tools))
          "

      - name: BroccoliQ infrastructure overlay
        run: |
          set -euo pipefail
          test -f broccolidb/infrastructure/index.ts
          test -f broccolidb/infrastructure/queue/Signaling.ts
          test -f broccolidb/infrastructure/db/IntegrityWorker.ts
          test -f broccolidb/infrastructure/db/DatabaseSchema.ts
          test -d broccolidb/infrastructure/db/pool
          test -f plugins/kanban_broccolidb/plugin.yaml
          test -f plugins/joyzoning_runtime/plugin.yaml
          test -f plugins/jsdp_mutation/plugin.yaml
          test -f agent/joyzoning/journal.py
          test -f agent/joyzoning/workflow.py
          test -f skills/devops/joyzoning-governed-work/SKILL.md
          test -f tools/convergence_tools.py
          test -f tools/joyzoning_tools.py
          test -f tools/jsdp_harness_tools.py
          test -f agent/joyzoning/jsdp_harness_client.py
          test -f tools/kanban_broccolidb_tools.py
          grep -q "'joyzoning'" toolsets.py
          test -f broccolidb/infrastructure/kanban/hive_sync.ts
          test -f broccolidb/infrastructure/kanban/hive_drift.ts
          test -f broccolidb/infrastructure/kanban/hive_board_intel.ts
          grep -q 'kanban_broccolidb_drift' toolsets.py

      - name: JoyZoning governance plugin loads
        run: |
          python -c "
          from hermes_cli.plugins import discover_plugins, get_plugin_manager
          discover_plugins(force=True)
          pm = get_plugin_manager()
          loaded = [k for k in pm._plugins if 'joyzoning' in k]
          assert loaded, 'joyzoning_governance not discovered'
          for k in loaded:
              p = pm._plugins[k]
              assert p.enabled, f'{k} not enabled: {getattr(p, \"error\", None)}'
          print('ok:', loaded)
          "

      - name: Kanban BroccoliQ plugin loads
        run: |
          python -c "
          from hermes_cli.plugins import discover_plugins, get_plugin_manager
          discover_plugins(force=True)
          pm = get_plugin_manager()
          assert 'kanban_broccolidb' in pm._plugins, list(pm._plugins.keys())
          p = pm._plugins['kanban_broccolidb']
          assert p.enabled, getattr(p, 'error', None)
          print('ok: kanban_broccolidb')
          "

      - name: Kanban BroccoliQ bridge tests
        run: scripts/run_tests.sh tests/tools/test_kanban_broccolidb_tools.py -q

      - name: JoyZoning runtime tests
        run: scripts/run_tests.sh tests/agent/test_joyzoning_runtime.py -q

      - name: JoyZoning primitive tool tests
        run: scripts/run_tests.sh tests/tools/test_joyzoning_tools.py tests/tools/test_jsdp_harness_tools.py -q

      - name: JoyZoning production hardening tests
        run: scripts/run_tests.sh tests/agent/test_joyzoning_production.py -q
